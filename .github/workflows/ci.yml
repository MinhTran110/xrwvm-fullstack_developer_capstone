name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  Lint_Python_Files:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install Python dependencies
      run: |
        pip install pylint
        cd server
        pip install -r requirements.txt
    - name: Lint Python files
      run: |
        cd server
        pylint --disable=all --enable=E djangoapp/ || true

  Lint_JavaScript_Files:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install frontend dependencies
      run: |
        cd server/frontend
        npm install
    - name: Lint JavaScript files
      run: |
        cd server/frontend
        npx eslint src/ --ext .js,.jsx || true
    - name: Build frontend
      run: |
        cd server/frontend
        CI=false npm run build